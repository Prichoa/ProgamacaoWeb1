<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara ou Coroa | NexusGameHub</title>

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="logo">NexusGameHub</div>

  <nav>
    <a href="index.html">Início</a>
    <a href="jokenpo.html">Jokenpô</a>
    <a href="caraoucoroa.html">Cara ou Coroa</a>
    <a href="dados.html">Dados</a>
  </nav>
</header>

<section class="game-container">

  <div class="game-box">

    <h1>🪙 Cara ou Coroa</h1>

    <p>Escolha sua aposta:</p>

    <!-- MOEDA ANIMADA -->
    <div class="coin-container">
      <img id="moeda" class="coin" src="./img/moeda.png" alt="Moeda">
    </div>

    <!-- BOTÕES -->
    <div class="buttons">

      <button onclick="jogarMoeda('Cara')">
        Cara
      </button>

      <button onclick="jogarMoeda('Coroa')">
        Coroa
      </button>

    </div>

    <!-- RESULTADO -->
    <div class="result" id="resultado"></div>

    <!-- PLACAR -->
    <div class="placar">

      <p>Vitórias: <span id="vitorias">0</span></p>

      <p>Derrotas: <span id="derrotas">0</span></p>

    </div>

    <!-- BOTÃO RESET -->
    <button class="reset-btn" onclick="resetarCaraOuCoroa()">
     Resetar Placar
    </button>

  </div>

</section>

<script src="./js/script.js"></script>

</body>
</html>
