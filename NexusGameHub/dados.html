<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados | NexusGameHub</title>

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="logo">NexusGameHub</div>

  <nav>
    <a href="index.html">Início</a>
    <a href="jokenpo.html">Jokenpô</a>
    <a href="caraoucoroa.html">Cara ou Coroa</a>
    <a href="dados.html">Dados</a>
  </nav>
</header>

<section class="game-container">

  <div class="game-box">

    <h1>🎲 Jogo de Dados</h1>

    <p>Lance os dados e veja quem vence!</p>

       <!-- DADOS -->
    <div class="dice-container">

      <div>
        <p>Você</p>
        <img id="dadoUsuario" class="dice" src="./img/dados.png" alt="Dado do jogador">
      </div>

      <div>
        <p>Bot</p>
        <img id="dadoPC" class="dice" src="./img/dados.png" alt="Dado do bot">
      </div>

    </div>

     <!-- RESULTADO -->
     <div class="result" id="resultado"></div>

    <!-- BOTÃO JOGAR -->
    <button onclick="jogarDados()">
      Lançar Dados
    </button>

    <!-- PLACAR -->
    <div class="placar">

      <p>Você: <span id="vitorias">0</span></p>

      <p>Bot: <span id="derrotas">0</span></p>

      <p>Empates: <span id="empates">0</span></p>

    </div>

    <!-- BOTÃO RESET -->
    <button class="reset-btn" onclick="reiniciarDados()">
      Reiniciar Placar
    </button>

  </div>

</section>

<script src="./js/script.js"></script>

</body>
</html>
