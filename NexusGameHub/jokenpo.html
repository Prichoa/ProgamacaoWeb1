<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jokenpô | NexusGameHub</title>

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<header>
  <div class="logo">NexusGameHub</div>

  <nav>
    <a href="index.html">Início</a>
    <a href="jokenpo.html">Jokenpô</a>
    <a href="caraoucoroa.html">Cara ou Coroa</a>
    <a href="dados.html">Dados</a>
  </nav>
</header>

<section class="game-container">

  <div class="game-box">

    <h1>✊ Jokenpô</h1>

    <p>Escolha sua jogada:</p>

    <div class="buttons">

      <button onclick="jogar('Pedra')">🪨 Pedra</button>
      <button onclick="jogar('Papel')">📄 Papel</button>
      <button onclick="jogar('Tesoura')">✂️ Tesoura</button>

    </div>

    <div class="result" id="resultado"></div>

  
    <div class="placar">
      <p>Vitórias: <span id="vitorias">0</span></p>
      <p>Derrotas: <span id="derrotas">0</span></p>
      <p>Empates: <span id="empates">0</span></p>
    </div>

    <button class="reset-btn" onclick="resetarPlacar()">
      Resetar Placar
    </button>
    
  </div>

</section>

<script src="./js/script.js"></script>


</body>
</html>
